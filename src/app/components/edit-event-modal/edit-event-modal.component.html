<ion-modal [isOpen]="isOpen" (didDismiss)="close()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>编辑事件</ion-title>
        <ion-buttons slot="end">
          <ion-button fill="clear" (click)="close()">关闭</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content class="edit-modal-content">
      <form [formGroup]="editForm">
        <div class="form-section">
          <div class="section-title">基本信息</div>
          <ion-list lines="full">
            <ion-item>
              <ion-label position="stacked">标题 *</ion-label>
              <ion-input
                formControlName="EventTitle"
                placeholder="简明描述你的事件"
              ></ion-input>
            </ion-item>
            <ion-item>
              <ion-label position="stacked">类型 *</ion-label>
              <ion-select formControlName="EventType" interface="popover">
                <ion-select-option [value]="0">求助</ion-select-option>
                <ion-select-option [value]="1">帮助</ion-select-option>
              </ion-select>
            </ion-item>
            <ion-item>
              <ion-label position="stacked">类别 *</ion-label>
              <ion-input
                formControlName="EventCategory"
                placeholder="如：电脑维修"
              ></ion-input>
            </ion-item>
            <ion-item button detail="true" (click)="onLocationPickerClick()">
              <ion-label>位置 *</ion-label>
              <ion-note
                slot="end"
                [color]="editForm.value.Location ? 'primary' : 'medium'"
              >
                {{ editForm.value.Location || "请选择地点" }}
              </ion-note>
            </ion-item>
            <ion-item>
              <ion-label position="stacked">价格 (¥)</ion-label>
              <ion-input
                type="number"
                formControlName="Price"
                placeholder="0 表示无偿帮助"
              ></ion-input>
            </ion-item>
            <ion-item>
              <ion-label position="stacked">详细描述 *</ion-label>
              <ion-textarea
                formControlName="EventDetails"
                placeholder="补充说明你的需求"
                [autoGrow]="true"
                rows="3"
              ></ion-textarea>
            </ion-item>
          </ion-list>
        </div>

        <div class="form-section">
          <div class="section-title">事件图片</div>
          <div class="photo-upload-area" (click)="triggerFileInput()">
            <input
              #fileInput
              type="file"
              accept="image/*"
              multiple
              (change)="onFileSelected($event)"
              style="display: none"
            />
            <div class="photo-preview-container">
              @for (photo of getPhotoItems(); track $index; let i = $index) {
                <div class="photo-preview">
                  <img [src]="photo.preview" alt="预览" />
                  <ion-icon
                    name="close-circle"
                    class="remove-photo"
                    (click)="
                      removePhoto(
                        photo.isExisting ? 'existing' : 'new',
                        photo.index
                      );
                      $event.stopPropagation()
                    "
                  ></ion-icon>
                </div>
              }
              @if (getPhotoCount() === 0) {
                <div class="upload-placeholder">
                  <ion-icon name="image-outline"></ion-icon>
                  <p>点击上传</p>
                </div>
              } @else if (getPhotoCount() < 5) {
                <div class="upload-placeholder">
                  <ion-icon name="add-circle-outline"></ion-icon>
                </div>
              }
            </div>
            <ion-text color="medium" class="upload-hint">
              <p>最多上传5张图片</p>
            </ion-text>
          </div>
        </div>

        <div class="modal-actions">
          <ion-button fill="outline" color="medium" (click)="close()">
            取消
          </ion-button>
          <ion-button (click)="submit()" [disabled]="isSaving">
            {{ isSaving ? "保存中..." : "保存修改" }}
          </ion-button>
        </div>
      </form>
    </ion-content>
  </ng-template>
</ion-modal>

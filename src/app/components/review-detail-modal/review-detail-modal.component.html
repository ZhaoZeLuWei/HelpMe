<ion-modal [isOpen]="isOpen" (didDismiss)="close()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>订单评价详情</ion-title>
        <ion-buttons slot="end">
          <ion-button fill="clear" (click)="close()">关闭</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content class="review-detail-content">
      @if (isLoading) {
        <div class="empty-state">
          <ion-text color="medium"><p>加载中...</p></ion-text>
        </div>
      } @else if (reviews.length === 0) {
        <div class="empty-state">
          <ion-icon
            name="chatbubble-ellipses-outline"
            class="empty-icon"
          ></ion-icon>
          <ion-text color="medium"><p>暂无评价</p></ion-text>
        </div>
      } @else {
        <div class="review-list">
          @for (r of reviews; track r.id) {
            <div class="review-card">
              <div class="review-header">
                <ion-avatar>
                  <img [src]="getAvatarUrl(r.authorAvatar)" alt="头像" />
                </ion-avatar>
                <div class="review-meta">
                  <span class="author-name">{{ r.authorName }}</span>
                  <span class="review-time">{{ r.createTime }}</span>
                </div>
                <div class="score-badge">
                  @for (s of [1, 2, 3, 4, 5]; track s) {
                    <ion-icon
                      [name]="s <= r.rating ? 'star' : 'star-outline'"
                      class="star-icon"
                    ></ion-icon>
                  }
                  <span class="score-text">{{ r.rating }}分</span>
                </div>
              </div>
              @if (r.content) {
                <p class="review-content">{{ r.content }}</p>
              }
            </div>
          }
        </div>
      }
    </ion-content>
  </ng-template>
</ion-modal>

<ion-modal [isOpen]="isOpen" (didDismiss)="close()">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>订单评价</ion-title>
        <ion-buttons slot="end">
          <ion-button fill="clear" (click)="close()">关闭</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content class="review-content">
      <div class="review-card">
        <!-- 星级选择 -->
        <div class="star-section">
          <p class="section-label">请为此订单评分</p>
          <div class="star-row">
            @for (value of stars; track value) {
              <button
                class="star-btn"
                [class.active]="value <= currentScore"
                (click)="selectStar(value)"
              >
                <ion-icon
                  [name]="value <= currentScore ? 'star' : 'star-outline'"
                ></ion-icon>
              </button>
            }
          </div>
          <p class="star-hint">{{ currentScore }} 分</p>
        </div>

        <!-- 评价内容 -->
        <div class="text-section">
          <p class="section-label">评价内容</p>
          <div class="textarea-wrapper">
            <ion-textarea
              [formControl]="textControl"
              [autoGrow]="true"
              rows="4"
              placeholder="在此处写下你的评价（可为空）"
              class="review-textarea"
            ></ion-textarea>
            <span class="char-count">{{ textLength }}/200</span>
          </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-buttons">
          <ion-button
            expand="block"
            fill="outline"
            color="medium"
            (click)="close()"
            class="cancel-btn"
          >
            取消
          </ion-button>
          <ion-button
            expand="block"
            color="primary"
            (click)="onSubmit()"
            [disabled]="isSaving || reviewForm.invalid"
            class="submit-btn"
          >
            {{ isSaving ? "提交中..." : "提交评价" }}
          </ion-button>
        </div>
      </div>
    </ion-content>
  </ng-template>
</ion-modal>

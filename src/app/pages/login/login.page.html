<ion-header>
  <ion-toolbar>
    <ion-title>{{ t.title }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="closeModal()">{{ t.close }}</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="login-content" [fullscreen]="true">
  <div class="step-container">
    <h2>{{ t.welcome }}</h2>
    <p class="step-desc">{{ t.hint }}</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <ion-list>
        <ion-item>
          <ion-label position="floating">{{ t.phone }}</ion-label>
          <ion-input
            type="tel"
            inputmode="numeric"
            formControlName="phone"
            [maxlength]="11"
            [placeholder]="t.phonePlaceholder"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">{{ t.code }}</ion-label>
          <ion-input
            type="tel"
            inputmode="numeric"
            formControlName="code"
            [maxlength]="4"
            [placeholder]="t.codePlaceholder"
          ></ion-input>
          <ion-button
            slot="end"
            size="small"
            (click)="sendCode()"
            [disabled]="sendCooldown() > 0"
          >
            @if (sendCooldown() === 0) { {{ t.sendCode }} } @if (sendCooldown() > 0) {
            {{ sendCooldown() }}s }
          </ion-button>
        </ion-item>
      </ion-list>

      <div class="actions">
        <ion-button expand="block" type="submit">{{ t.login }}</ion-button>
      </div>
    </form>

    <div class="hint">{{ t.tip }}</div>
  </div>
</ion-content>

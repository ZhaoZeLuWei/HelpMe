<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>{{ t.title }}</ion-title>
    @if (isLoggedIn) {
    <ion-buttons slot="end">
      <ion-button fill="clear" color="medium" (click)="confirmLogout()">
        <ion-icon slot="start" name="log-out"></ion-icon>
        <span>{{ t.logout }}</span>
      </ion-button>
    </ion-buttons>
    }
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  @if (!isLoggedIn) {
  <app-tab4-login-prompt
    [t]="t"
    (login)="openLoginModal()"
    (register)="openRegisterModal()"
  ></app-tab4-login-prompt>
  } @if (isLoggedIn) {
  <app-tab4-profile-card
    [userInfo]="userInfo"
    [t]="t"
    (editProfile)="openEditProfileModal()"
    (showFollowers)="openFollowersModal()"
  ></app-tab4-profile-card>

  <app-tab4-quick-actions
    [t]="t"
    [favoritesDesc]="getFavoritesDesc()"
    [followsDesc]="getFollowsDesc()"
    (openFavorites)="openFavoritesModal()"
    (openFollows)="openFollowsModal()"
    (openSupport)="openSupportChat()"
  ></app-tab4-quick-actions>

  <ion-segment [value]="activeSection" (ionChange)="onSectionChange($event)">
    <ion-segment-button value="events">
      <ion-label>{{ t.myEvents }}</ion-label>
    </ion-segment-button>
    <ion-segment-button value="orders">
      <ion-label>{{ t.myOrders }}</ion-label>
    </ion-segment-button>
  </ion-segment>

  @if (activeSection === 'events') {
  <app-tab4-events-panel
    [events]="tasks"
    [isLoading]="isLoadingEvents"
    [deletingIds]="deletingIds"
    [blockedEditIds]="getBlockedEditIds()"
    [blockedEditOnlyIds]="getBlockedEditOnlyIds()"
    [blockedToggleIds]="getBlockedToggleIds()"
    [t]="t"
    (viewDetail)="goToEventDetail($event)"
    (edit)="editTask($event)"
    (remove)="openDeleteAlert($event)"
    (toggleStatus)="toggleEventStatus($event)"
  ></app-tab4-events-panel>
  } @else {
  <app-tab4-orders-panel
    [orders]="getFilteredOrders()"
    [orderStats]="orderStats"
    [isLoading]="isLoadingOrders"
    [filter]="orderFilter"
    [t]="t"
    (filterChange)="setOrderFilter($event)"
    (viewEvent)="goToEventDetail($event)"
    (viewOrder)="openOrderDetail($event)"
    (confirm)="confirmOrder($event)"
    (complete)="completeOrder($event)"
    (review)="openReviewModal($event)"
    (cancel)="cancelOrder($event)"
    (viewReview)="openReviewDetail($event)"
  ></app-tab4-orders-panel>
  }

  <app-review-modal
    [isOpen]="isReviewModalOpen"
    [isSaving]="isSubmittingReview"
    (didDismiss)="closeReviewModal()"
    (submit)="handleReviewSubmit($event)"
  ></app-review-modal>

  <app-review-detail-modal
    [isOpen]="isReviewDetailOpen"
    [orderId]="reviewDetailOrderId"
    (didDismiss)="closeReviewDetail()"
  ></app-review-detail-modal>

  <app-tab4-edit-profile-modal
    [isOpen]="isEditProfileModalOpen"
    [userInfo]="userInfo"
    [userId]="currentUserId"
    [t]="t"
    (didDismiss)="closeEditProfileModal()"
    (profileSaved)="onProfileSaved($event)"
  ></app-tab4-edit-profile-modal>

  <ion-alert
    [isOpen]="isDeleteAlertOpen"
    [header]="t.deleteConfirmTitle || '确认删除'"
    [message]="t.deleteConfirmMsg || '确定要删除这个事件吗？此操作不可撤销。'"
    [buttons]="alertButtons"
    (didDismiss)="onDeleteAlertDismiss()"
  ></ion-alert>

  <app-edit-event-modal
    #editEventModal
    [isOpen]="isEditModalOpen"
    [eventData]="editingEventData"
    [isSaving]="isSavingEdit"
    (didDismiss)="closeEditModal()"
    (save)="submitEdit($event)"
    (openLocationPicker)="openLocationPicker()"
  ></app-edit-event-modal>

  <app-tab4-favorites-modal
    [isOpen]="isFavoritesModalOpen"
    [t]="t"
    [prefetchedFavorites]="favoritesCache"
    (didDismiss)="closeFavoritesModal()"
    (cardClick)="onFavoriteCardClick($event)"
    (countChange)="onFavoritesCountChange($event)"
    (listChange)="onFavoritesListChange($event)"
  ></app-tab4-favorites-modal>

  <app-tab4-user-list-modal
    [isOpen]="isFollowsModalOpen"
    mode="follows"
    [t]="t"
    (didDismiss)="closeFollowsModal()"
    (userClick)="goToUserFromList($event)"
    (countChange)="followsCount = $event"
  ></app-tab4-user-list-modal>

  <app-tab4-user-list-modal
    [isOpen]="isFollowersModalOpen"
    mode="followers"
    [t]="t"
    (didDismiss)="closeFollowersModal()"
    (userClick)="goToUserFromList($event)"
  ></app-tab4-user-list-modal>

  <app-tab4-order-detail-modal
    [isOpen]="isOrderDetailModalOpen"
    [order]="currentOrderDetail"
    [t]="t"
    (didDismiss)="closeOrderDetail()"
  ></app-tab4-order-detail-modal>
  }
</ion-content>

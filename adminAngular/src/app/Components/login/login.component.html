<div class="login-container">
  <div class="login-box">
    <h2>家家帮管理后台</h2>
    <form (ngSubmit)="login()">
      <div class="form-group">
        <label>账号</label>
        <input
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="请输入管理员账号"
        />
      </div>
      <div class="form-group">
        <label>密码</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          autocomplete="current-password"
          placeholder="请输入密码"
        />
      </div>
      <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>
      <button type="submit" [disabled]="loading">
        {{ loading ? "登录中..." : "登录" }}
      </button>
    </form>
  </div>
</div>

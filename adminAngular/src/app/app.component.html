<div class="app-layout" *ngIf="authService.isLoggedIn(); else loginView">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <mat-icon>home</mat-icon>
        <span>家家帮</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a
        routerLink=""
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-item"
      >
        <mat-icon>dashboard</mat-icon>
        <span>数据看板</span>
      </a>
      <a routerLink="verify" routerLinkActive="active" class="nav-item">
        <mat-icon>check_circle</mat-icon>
        <span>认证审核</span>
      </a>
      <a routerLink="staff" routerLinkActive="active" class="nav-item">
        <mat-icon>people</mat-icon>
        <span>人员管理</span>
      </a>
      <a routerLink="events" routerLinkActive="active" class="nav-item">
        <mat-icon>event</mat-icon>
        <span>事件管理</span>
      </a>
      <a routerLink="orders" routerLinkActive="active" class="nav-item">
        <mat-icon>description</mat-icon>
        <span>订单管理</span>
      </a>
      <a routerLink="reviews" routerLinkActive="active" class="nav-item">
        <mat-icon>rate_review</mat-icon>
        <span>评价管理</span>
      </a>
      <a routerLink="support" routerLinkActive="active" class="nav-item">
        <mat-icon>support_agent</mat-icon>
        <span>客服中心</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="authService.logout()">
        <mat-icon>logout</mat-icon>
        <span>退出登录</span>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>

<ng-template #loginView>
  <router-outlet></router-outlet>
</ng-template>
